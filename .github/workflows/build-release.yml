name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Запуск при пуше тега v1.0.0, v2.1.3 и т.д.
  workflow_dispatch:  # Ручной запуск
    inputs:
      version:
        description: 'Версия релиза (например, 1.0.0)'
        required: true
        default: '1.0.0'
      prerelease:
        description: 'Пре-релиз'
        type: boolean
        default: false
      release_title:
        description: 'Название релиза'
        required: false
        default: ''
      release_notes:
        description: 'Описание релиза'
        required: false
        default: ''

env:
  APP_NAME: ShadowGate
  APP_DESCRIPTION: "VPN/Proxy/MTProto application with DPI bypass capabilities"
  ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/r27c

jobs:
  # ============================================================
  # СБОРКА ДЛЯ WINDOWS
  # ============================================================
  build_windows:
    name: Build Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Rust native library for Windows (mtproto_proxy.dll)
        run: |
          cd native/mtproto_proxy
          cargo build --release --features windows --target x86_64-pc-windows-msvc

      - name: Copy mtproto_proxy.dll to Flutter build output
        run: |
          mkdir -p build\windows\x64\runner\Release
          copy /Y native\mtproto_proxy\target\x86_64-pc-windows-msvc\release\mtproto_proxy.dll build\windows\x64\runner\Release\

      - name: Verify native library
        run: |
          echo "=== mtproto_proxy.dll ==="
          dir native\mtproto_proxy\target\x86_64-pc-windows-msvc\release\mtproto_proxy.dll

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create Windows installer (ZIP)
        run: |
          cd build\windows\x64\runner\Release
          powershell Compress-Archive -Path * -DestinationPath $env:RUNNER_TEMP\ShadowGate-Windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowGate-Windows
          path: ${{ runner.temp }}/ShadowGate-Windows.zip

  # ============================================================
  # СБОРКА ДЛЯ ANDROID (APK + AAB)
  # Включает сборку нативной Rust-библиотеки для MTProto прокси
  # ============================================================
  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android,
            i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Build Rust native library for Android
        run: |
          cd native/mtproto_proxy
          cargo ndk \
            -t aarch64-linux-android \
            -t armv7-linux-androideabi \
            -t x86_64-linux-android \
            -t i686-linux-android \
            -o ../../android/app/src/main/jniLibs \
            build --release
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Verify native libraries
        run: |
          echo "=== Native libraries ==="
          find android/app/src/main/jniLibs -name "*.so" -exec ls -lh {} \;

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShadowGate-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ShadowGate-Android-AAB
          path: build/app/outputs/bundle/release/app-release.aab

  # ============================================================
  # СБОРКА ДЛЯ iOS (только на macOS)
  # Включает:
  #   - Сборка Rust-библиотеки (libmtproto_proxy.a) для arm64 + simulator
  #   - Основное приложение (Runner.app)
  #   - Packet Tunnel Provider extension (ShadowTunnel.appex)
  #   - Создание IPA с корректной структурой Payload/
  # ============================================================
  build_ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >
            aarch64-apple-ios,
            aarch64-apple-ios-sim,
            x86_64-apple-ios

      - name: Build Rust native library for iOS
        run: |
          cd native/mtproto_proxy

          # Сборка для arm64 (физические устройства)
          cargo build --release --features ios --target aarch64-apple-ios

          # Сборка для симулятора (arm64 + x86_64)
          cargo build --release --features ios --target aarch64-apple-ios-sim
          cargo build --release --features ios --target x86_64-apple-ios

          # Создаём универсальную библиотеку для симулятора через lipo
          mkdir -p target/universal-sim
          lipo -create \
            target/aarch64-apple-ios-sim/release/libmtproto_proxy.a \
            target/x86_64-apple-ios/release/libmtproto_proxy.a \
            -output target/universal-sim/libmtproto_proxy.a

          # Копируем .a файлы в Xcode проект
          mkdir -p ../../ios/Runner/Libraries
          cp target/aarch64-apple-ios/release/libmtproto_proxy.a \
            ../../ios/Runner/Libraries/libmtproto_proxy_device.a
          cp target/universal-sim/libmtproto_proxy.a \
            ../../ios/Runner/Libraries/libmtproto_proxy_sim.a

          # Копируем C header
          cp mtproto_proxy.h ../../ios/Runner/Libraries/

          echo "=== iOS native libraries ==="
          ls -lh ../../ios/Runner/Libraries/

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod repo update --silent

      - name: Install dependencies
        run: flutter pub get

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (Release) with development signing
        run: |
          # Сборка с development signing для CI (без Apple Developer аккаунта)
          # Для публикации в App Store нужно заменить на ручную подпись
          flutter build ios --release --no-codesign

      - name: Build Packet Tunnel Provider extension
        run: |
          # Собираем NEPacketTunnelProvider extension
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      - name: Prepare IPA structure with extension
        run: |
          # Создаём структуру IPA с Packet Tunnel Provider
          APP_DIR="build/ios/iphoneos"
          PAYLOAD_DIR="$APP_DIR/Payload"
          EXTENSION_PATH="$APP_DIR/Payload/Runner.app/PlugIns/ShadowTunnel.appex"
          
          mkdir -p "$PAYLOAD_DIR"
          cp -r "$APP_DIR/Runner.app" "$PAYLOAD_DIR/"
          
          # Создаём каталог для PlugIns если его нет
          mkdir -p "$PAYLOAD_DIR/Runner.app/PlugIns"
          
          # Копируем extension если он был собран
          if [ -d "build/ios/Build/Products/Release-iphoneos/ShadowTunnel.appex" ]; then
            cp -r "build/ios/Build/Products/Release-iphoneos/ShadowTunnel.appex" \
              "$PAYLOAD_DIR/Runner.app/PlugIns/"
            echo "✅ Packet Tunnel Provider extension добавлен в IPA"
          else
            echo "⚠️ Extension не найден, IPA будет без NEPacketTunnelProvider"
          fi
          
          # Создаём IPA
          cd "$APP_DIR"
          zip -r "${{ runner.temp }}/ShadowGate-iOS.ipa" Payload/
          
          echo "✅ IPA создан: ${{ runner.temp }}/ShadowGate-iOS.ipa"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowGate-iOS
          path: ${{ runner.temp }}/ShadowGate-iOS.ipa

  # ============================================================
  # СБОРКА ДЛЯ macOS
  # ============================================================
  build_macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create macOS DMG
        run: |
          cd build/macos/Build/Products/Release
          zip -r ${{ runner.temp }}/ShadowGate-macOS.zip ShadowGate.app/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowGate-macOS
          path: ${{ runner.temp }}/ShadowGate-macOS.zip

  # ============================================================
  # СОЗДАНИЕ РЕЛИЗА И ПУБЛИКАЦИЯ
  # ============================================================
  create_release:
    name: Create Release & Notify
    needs: [build_windows, build_android, build_ios, build_macos]
    runs-on: ubuntu-latest
    if: always()  # Запускаем даже если некоторые сборки упали

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version and release info
        id: release_info
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            PRERELEASE="${{ github.event.inputs.prerelease }}"
            TITLE="${{ github.event.inputs.release_title }}"
            NOTES="${{ github.event.inputs.release_notes }}"
          else
            # Из тега v1.0.0 -> 1.0.0
            VERSION="${GITHUB_REF_NAME#v}"
            PRERELEASE="false"
            TITLE=""
            NOTES=""
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "notes=$NOTES" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_info.outputs.version }}
          name: ${{ steps.release_info.outputs.title != '' && steps.release_info.outputs.title || format('{0} v{1}', env.APP_NAME, steps.release_info.outputs.version) }}
          body: ${{ steps.release_info.outputs.notes != '' && steps.release_info.outputs.notes || format('## {0} v{1}\n\n{2}', env.APP_NAME, steps.release_info.outputs.version, env.APP_DESCRIPTION) }}
          prerelease: ${{ steps.release_info.outputs.prerelease == 'true' }}
          files: |
            artifacts/ShadowGate-Windows/ShadowGate-Windows.zip
            artifacts/ShadowGate-Android-APK/app-release.apk
            artifacts/ShadowGate-Android-AAB/app-release.aab
            artifacts/ShadowGate-iOS/ShadowGate-iOS.ipa
            artifacts/ShadowGate-macOS/ShadowGate-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================================
      # ОТПРАВКА УВЕДОМЛЕНИЯ В TELEGRAM
      # ============================================================
      - name: Send Telegram Notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            *${{ env.APP_NAME }} — Сборка завершена*
            
            **Версия:** `${{ steps.release_info.outputs.version }}`
            **Статус:** ${{ job.status == 'success' && '✅ Успешно' || '❌ Ошибка' }}
            **Название:** ${{ steps.release_info.outputs.title != '' && steps.release_info.outputs.title || format('{0} v{1}', env.APP_NAME, steps.release_info.outputs.version) }}
            
            ${{ steps.release_info.outputs.notes != '' && format('**Описание:**\n{0}', steps.release_info.outputs.notes) || '' }}
            
            🔗 [Скачать релиз](${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.release_info.outputs.version }})

            Собрано автоматически через GitHub Actions.