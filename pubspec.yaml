name: shadowgate
description: "VPN/Proxy application with DPI bypass capabilities"
publish_to: 'none'
version: 0.1.0+1

homepage: https://github.com/werhes/shadowgate

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  network_info_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android:
    generate: true
    adaptive_icon_background: "#1a1a2e"
    adaptive_icon_foreground: "appicon.png"
  ios:
    generate: true

flutter:
  uses-material-design: true
