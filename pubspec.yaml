name: shadowgate
description: "VPN/Proxy application with DPI bypass capabilities"
publish_to: 'none'
version: 0.1.0+1

homepage: https://github.com/werhes/shadowgate

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  network_info_plus: ^6.0.0
  system_tray: ^2.0.3
  window_manager: ^0.4.3
  url_launcher: ^6.3.2
  ffi: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android:
    generate: true
    adaptive_icon_background: "#1a1a2e"
    adaptive_icon_foreground: "appicon.png"
  ios:
    generate: true

flutter:
  uses-material-design: true

# Платформенная фильтрация плагинов:
# system_tray и window_manager работают ТОЛЬКО на Desktop (Windows/macOS/Linux)
# На Android/iOS они не поддерживаются и должны быть исключены из регистрации
platforms:
  android:
  ios:
  linux:
  macos:
  windows:
  web:
